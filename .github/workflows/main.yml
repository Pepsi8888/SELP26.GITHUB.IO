<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Together, We Build Community</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&display=swap" rel="stylesheet">

    <style>
        /* ตั้งค่าพื้นฐานสำหรับหน้าเว็บ */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
        }

        /* การตั้งค่าส่วนรูปภาพพื้นหลังและการจัดวางคอนเทนต์ */
        .hero-section {
            position: relative;
            width: 100%;
            height: 100vh;
            
            /* กรุณาเปลี่ยน URL ด้านล่างให้เป็นพาร์ทที่อยู่รูปภาพของคุณ */
            background-image: url('We-SELE.jpg'); 
            
            background-size: cover;
            background-position: center bottom;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 8%; /* กำหนดระยะห่างจากขอบบน */
        }

        /* สไตล์สำหรับตัวอักษรคำว่า WE */
        .main-title {
            font-size: 18vw; /* ปรับขนาดอัตโนมัติตามความกว้างหน้าจอ */
            font-weight: 900; /* ความหนาสูงสุด */
            color: #2b2924; /* สีน้ำตาลเข้ม/เทาดำ ตามภาพต้นฉบับ */
            line-height: 0.8;
            margin: 0;
            letter-spacing: -0.02em;
        }

        /* สไตล์สำหรับตัวอักษรคำบรรยายด้านล่าง */
        .sub-title {
            font-size: 2.2vw;
            font-weight: 800;
            color: #2b2924;
            margin-top: 15px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* การปรับแต่งเพิ่มเติมสำหรับหน้าจอขนาดเล็ก (สมาร์ทโฟน) */
        @media (max-width: 768px) {
            .hero-section {
                padding-top: 15%;
            }
            .main-title {
                font-size: 35vw;
            }
            .sub-title {
                font-size: 4.5vw;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>

    <main class="hero-section">
        <h1 class="main-title">WE</h1>
        <p class="sub-title">Together, we build community.</p>
    </main>

</body>
</html>
